<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4834d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00a381"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#g1)"/>
  <!-- Graduation cap (mortarboard) -->
  <polygon points="32,10 52,22 32,34 12,22" fill="white" opacity="0.95"/>
  <!-- Cap center dot -->
  <circle cx="32" cy="22" r="2.5" fill="#00b894"/>
  <!-- Graduation cap skullcap base -->
  <rect x="24" y="32" width="16" height="6" rx="2" fill="white" opacity="0.85"/>
  <!-- Tassel string -->
  <line x1="32" y1="22" x2="44" y2="30" stroke="#fdcb6e" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel fringe -->
  <circle cx="44" cy="31" r="2" fill="#fdcb6e"/>
  <!-- Sparkle / AI glow -->
  <circle cx="18" cy="14" r="1.5" fill="#fdcb6e" opacity="0.9"/>
  <circle cx="48" cy="16" r="1" fill="#fdcb6e" opacity="0.7"/>
</svg>
